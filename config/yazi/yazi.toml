[mgr]
show_hidden = true

[opener]
edit = [
    { name = "edit", run = 'nvim "$@"', block = true, desc = "Neovim", for = "unix" }
]

play = [
    { name = "play", run = 'mpv "$@"', orphan = true, desc = "MPV", for = "unix" }
]

zen-beta = [
     { name = "zen-beta", run = 'zen-beta "$@"', orphan = true, desc = "zen-beta", for = "unix" }
]

[open]
prepend_rules = [
    # 1. Directories
    { mime = "inode/directory", use = "open" },

    # 2. Text/Code files (LSP/Mime based)
    { mime = "text/*", use = "edit" },
    { mime = "application/javascript", use = "edit" },
    { mime = "application/json", use = "edit" },

    # 3. Extension based (Change 'url' to 'name')
    { name = "*.{md,txt,conf,toml,yaml,yml,lua,fish,py,rs}", use = "edit" },

    # 4. Media
    { mime = "audio/*", use = "play" },
    { mime = "video/*", use = "play" },

    # 5. Fallback
    { mime = "*", use = "zen-beta" }
]
