### MONITORS ###
################
monitor=,preferred,auto,1

###################
### MY PROGRAMS ###
###################
$terminal = foot
$fileManager = dolphin
$menu = rofi -show drun
$browser = zen-beta
$editor = kitty -e nvim

#################
### AUTOSTART ###
#################
# Using your specific wallpaper path from dwl
exec-once = swaybg -i /home/wolk/nixos-dotfiles/walls/d1P6xtd.jpeg -m fill
# You might want a bar like waybar here since showbar was 1
exec-once = waybar

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    kb_options = caps:escape
    
    touchpad {
        natural_scroll = false
        tap-to-click = true
        disable_while_typing = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 2.5
    gaps_out = 5 # Adjusted for a cleaner look, was 20 in default

    border_size = 2

    # Using your "Eldritch Newsprint" colors
    col.active_border = rgb(bbb49d) # Vintage Bone
    col.inactive_border = rgb(49504f) # Steel Shadow

    # Dwl used a master-stack layout
    layout = master 
}

decoration {
    rounding = 0 # Keeps the minimalist dwl aesthetic
    
    active_opacity = 1
    inactive_opacity = 1
    fullscreen_opacity = 0.85

    shadow {
        enabled = false # Minimalist preference
    }

    blur {
        enabled = false
    }
}

# Master layout settings to mimic dwl/dwm
master {
    new_status = slave   # New windows go to the stack (aside), not the master position
    new_on_top = false    # New windows are added to the bottom of the stack (below)
    mfact = 0.55
    orientation = left    # Keeps master on the left, stack on the right
}

# Basic animations - can be set to 'enabled = false' for instant transitions like dwl
animations {
    enabled = false
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

# Core Binds
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, B, exec, $browser
bind = $mainMod, Z, exec, $editor
bind = $mainMod, F, exec, $terminal -e yazi
bind = $mainMod SHIFT, E, exec, $fileManager
bind = $mainMod, D, exec, $menu

# Custom Scripts & Apps
bind = $mainMod, M, exec, $terminal -e rmpc
bind = $mainMod, C, exec, $terminal -e cava
bind = $mainMod, X, exec, /home/shadow/docker/suwayomi/start-suwayomi-latest.sh
bind = $mainMod SHIFT, X, exec, /home/shadow/docker/suwayomi/stop-suwayomi.sh
bind = $mainMod SHIFT, P, exec, /home/shadow/.local/bin/scripts/power.sh
bind = $mainMod SHIFT, D, exec, /home/shadow/.local/bin/scripts/rofifinder.sh

# Layout Controls (dwl style)
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
bind = $mainMod, I, layoutmsg, addmaster
bind = $mainMod, D, layoutmsg, removemaster
bind = $mainMod, H, splitratio, -0.05
bind = $mainMod, L, splitratio, +0.05
bind = $mainMod SHIFT, Return, layoutmsg, swapwithmaster
bind = $mainMod, Space, layoutmsg, orientationnext
bind = $mainMod SHIFT, Space, togglefloating,
bind = $mainMod SHIFT, F, fullscreen,

# Utility Binds
bind = $mainMod, S, exec, grim ~/Pictures/$(date +%Y-%m-%d-%H%M%S)_screenshot.png
bind = $mainMod, F5, exec, hyprsunset --temperature 3500
bind = $mainMod SHIFT, F5, exec, pkill hyprsunset

# Audio (Pipewire/Playerctl)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay, exec, playerctl play-pause

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Mouse Binds
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, Q, exit
